name: Deploy Node.js app

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/khoavd.pem
          chmod 600 ~/.ssh/khoavd.pem

      - name: Deploy latest Node.js app to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_SSH_USER }}
        run: |
          GIT_REPO="https://github.com/${GITHUB_REPOSITORY}.git"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/khoavd.pem "${EC2_USER}@${EC2_HOST}" << EOF
          set -e
          if [ ! -d /opt/nodeapp/.git ]; then
            sudo mkdir -p /opt/nodeapp
            sudo chown "${EC2_USER}:${EC2_USER}" /opt/nodeapp
            git clone "\$GIT_REPO" /opt/nodeapp
          else
            sudo chown -R "${EC2_USER}:${EC2_USER}" /opt/nodeapp
            cd /opt/nodeapp
            git config --global --add safe.directory /opt/nodeapp
            git fetch origin
            git reset --hard origin/main
          fi

          cd /opt/nodeapp
          npm install --production
          sudo systemctl restart app
          EOF
