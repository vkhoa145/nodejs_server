name: Deploy Node.js app

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Prepare SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/khoavd.pem
          chmod 600 ~/.ssh/khoavd.pem

      - name: Generate inventory
        working-directory: intermediate/nodejs_server_deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_SSH_USER }}
        run: |
          cat > inventory.ini <<EOF
[pet_ec2]
pet-ec2 ansible_host=${EC2_HOST} ansible_user=${EC2_USER} ansible_ssh_private_key_file=~/.ssh/khoavd.pem
EOF

      - name: Configure EC2 (install Node.js and git)
        working-directory: intermediate/nodejs_server_deployment
        run: ansible-playbook configure_ec2.yml

      - name: Deploy Node.js application
        working-directory: intermediate/nodejs_server_deployment
        run: ansible-playbook deploy_app.yml

